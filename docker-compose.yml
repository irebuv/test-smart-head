name: test-smart-head

services:
  db:
      image: mysql:8.4
      container_name: smart-head-db
      restart: unless-stopped
      environment:
          MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
          MYSQL_DATABASE: ${DB_DATABASE}
          MYSQL_USER: ${DB_USERNAME}
          MYSQL_PASSWORD: ${DB_PASSWORD}
      ports:
          - "${MYSQL_PORT}:3306"
      volumes:
          - mysql_data:/var/lib/mysql

  phpmyadmin:
      image: phpmyadmin/phpmyadmin
      container_name: smart-head-phpmyadmin
      restart: unless-stopped
      ports:
          - "${PHPMYADMIN_PORT}:80"
      environment:
          PMA_HOST: db
          PMA_PORT: 3306
      depends_on:
          - db

  backend:
      build:
          context: ./
          dockerfile: docker/backend/Dockerfile
      container_name: smart-head-backend
      restart: unless-stopped
      working_dir: /app
      volumes:
          - ./:/app:cached
          - backend_vendor:/app/vendor
      depends_on:
          - db
      environment:
          DB_HOST: db
          DB_PORT: 3306
          DB_DATABASE: ${DB_DATABASE}
          DB_USERNAME: ${DB_USERNAME}
          DB_PASSWORD: ${DB_PASSWORD}
      command: sh -c "chmod -R 777 storage bootstrap/cache && php-fpm"

  nginx:
      image: nginx:alpine
      container_name: smart-head-nginx
      restart: unless-stopped
      ports:
          - "${BACKEND_PORT}:80"
      volumes:
          - ./:/app
          - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      depends_on:
          - backend

volumes:
    mysql_data:
    backend_vendor:
